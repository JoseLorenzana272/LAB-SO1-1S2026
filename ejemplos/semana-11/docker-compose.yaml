services:
    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: rabbitmq
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "ping"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    producer:
        build:
            context: ./producer
            dockerfile: Dockerfile
        depends_on:
            rabbitmq:
                condition: service_healthy
        restart: on-failure
        environment:
            - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

    consumer:
        build:
            context: ./consumer
            dockerfile: Dockerfile
        depends_on:
            rabbitmq:
                condition: service_healthy
        restart: on-failure
        environment:
            - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
